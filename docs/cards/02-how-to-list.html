<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>02 · 怎麼知道有哪些技能</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #191919; --bg-container: #353535; --bg-content: #252525;
    --gold: #ba9972; --gold-light: #ddb586;
    --text: #e7e7e7; --text-secondary: #c4c4c4; --text-tertiary: #858585;
    --border: #595959; --border-secondary: #4a4a4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1080px;
    background: var(--bg-base);
    font-family: 'Roboto', 'Noto Sans TC', sans-serif;
    letter-spacing: 0.05em; line-height: 1.8;
    color: var(--text);
    -webkit-font-smoothing: antialiased; overflow: hidden;
  }
  .canvas { width: 1080px; height: 1080px; padding: 80px; display: flex; flex-direction: column; position: relative; }

  .header { display: flex; align-items: baseline; justify-content: space-between; padding-bottom: 32px; border-bottom: 1px solid var(--border-secondary); }
  .brand { font-size: 13px; font-weight: 500; letter-spacing: 0.3em; color: var(--gold); }
  .brand-dot { color: var(--text-tertiary); margin: 0 12px; }
  .meta { font-family: 'Roboto Mono', monospace; font-size: 12px; color: var(--text-tertiary); letter-spacing: 0.15em; }

  .hero { margin-top: 64px; display: flex; align-items: flex-end; gap: 40px; }
  .number { font-size: 144px; font-weight: 700; line-height: 0.85; color: var(--gold); letter-spacing: -0.02em; flex-shrink: 0; }
  .number-line { flex: 1; height: 1px; background: var(--border); margin-bottom: 32px; position: relative; }
  .number-line::after { content: ''; position: absolute; right: 0; top: -2px; width: 5px; height: 5px; background: var(--gold); border-radius: 50%; }

  .title-block { margin-top: 36px; }
  .eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.3em; color: var(--gold-light); text-transform: uppercase; margin-bottom: 14px; }
  .title { font-family: 'Noto Sans TC', sans-serif; font-size: 44px; font-weight: 700; line-height: 1.3; letter-spacing: 0.02em; color: var(--text); }

  /* ── 雙路徑並列 ── */
  .paths { margin-top: 48px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .path-card {
    padding: 28px 28px 32px;
    background: var(--bg-container);
    border-top: 2px solid var(--gold);
    border-radius: 0 0 4px 4px;
  }
  .path-tag { font-family: 'Roboto Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; }
  .path-title { font-family: 'Noto Sans TC', sans-serif; font-size: 22px; font-weight: 700; line-height: 1.4; color: var(--text); margin-top: 12px; }
  .path-sub { font-size: 13px; color: var(--text-tertiary); margin-top: 8px; line-height: 1.6; letter-spacing: 0.05em; }
  .path-cmd {
    margin-top: 18px;
    padding: 14px 16px;
    background: var(--bg-content);
    border: 1px solid var(--border-secondary);
    border-radius: 4px;
    font-family: 'Roboto Mono', monospace;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 0.02em;
    word-break: break-all;
  }
  .path-quote {
    margin-top: 18px;
    padding: 14px 18px;
    background: var(--bg-content);
    border-left: 2px solid var(--gold-light);
    border-radius: 0 4px 4px 0;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px;
    color: var(--text);
    line-height: 1.6;
  }

  .body-block { margin-top: 36px; }
  .body-text { font-family: 'Noto Sans TC', sans-serif; font-size: 16px; line-height: 1.95; color: var(--text-secondary); max-width: 820px; }
  .body-text strong { color: var(--text); font-weight: 500; }

  .footer { margin-top: auto; padding-top: 24px; border-top: 1px solid var(--border-secondary); display: flex; justify-content: space-between; align-items: center; }
  .wordmark { font-size: 14px; font-weight: 700; letter-spacing: 0.4em; color: var(--text); }
  .footer-meta { font-family: 'Roboto Mono', monospace; font-size: 11px; letter-spacing: 0.2em; color: var(--text-tertiary); }
  .footer-meta .current { color: var(--gold); }
</style>
</head>
<body>
<div class="canvas">

  <div class="header">
    <div class="brand">ARTOGO<span class="brand-dot">·</span>NOTES</div>
    <div class="meta">CLAUDE_SKILLS / Q&amp;A · 2026</div>
  </div>

  <div class="hero">
    <div class="number">02</div>
    <div class="number-line"></div>
  </div>

  <div class="title-block">
    <div class="eyebrow">QUESTION TWO</div>
    <h1 class="title">怎麼知道我有哪些技能？</h1>
  </div>

  <!-- 雙路徑並列 -->
  <div class="paths">
    <div class="path-card">
      <div class="path-tag">PATH A</div>
      <div class="path-title">用指令列出<br>（最準確）</div>
      <div class="path-sub">在終端機執行，會印出全部已安裝清單</div>
      <div class="path-cmd">npx skills ls -g</div>
    </div>
    <div class="path-card">
      <div class="path-tag">PATH B</div>
      <div class="path-title">直接問 Claude<br>（最方便）</div>
      <div class="path-sub">新對話開頭問一句即可</div>
      <div class="path-quote">「我現在有哪些 skill？」</div>
    </div>
  </div>

  <div class="body-block">
    <p class="body-text">
      兩個方法都通。<strong>指令適合確認版本與完整清單</strong>，直接問 Claude 適合臨時想起、不想離開對話框的時候。記哪一個都好。
    </p>
  </div>

  <div class="footer">
    <div class="wordmark">ARTOGO</div>
    <div class="footer-meta"><span class="current">02</span> / 06</div>
  </div>

</div>
</body>
</html>
